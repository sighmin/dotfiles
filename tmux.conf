################################################################################
# Settings
################################################################################
# Basic quality of life improvements for tmux
set -g prefix C-a # Set primary prefix to Ctrl-a
setw -g mode-keys vi # Use vi-style keybindings in copy mode
# Detect the correct TERM value for new sessions.
# if-shell uses /bin/sh, so bashisms like [[ do not work.
if "[ $(tput colors) = 16777216 ]" {
  set -g default-terminal "tmux-direct"
} {
  if "[ $(tput colors) = 256 ]" {
    set -g default-terminal "tmux-256color"
  } {
    set -g default-terminal "tmux"
  }
}
set -g base-index 1 # Start window numbering at 1
set-window-option -g pane-base-index 1 # Start pane numbering at 1
set -g renumber-windows on # Renumber windows when one is closed
set -s escape-time 0 # Setting the delay between prefix and command
setw -g monitor-activity on # Enable activity monitoring & alerts for other windows
set -g visual-activity on # Visual activity indicator in status bar
set -g mouse on # Enable mouse support for pane resizing, scrolling, and selection
set -g history-limit 10000 # Increase scrollback lines

# System defaults & clipboard support
set -g default-command /bin/zsh # Use zsh as default command
set -g default-shell /bin/zsh # Use zsh as default shell
set -g message-limit 100 # Number of tmux messages, default is 20

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on



################################################################################
# Bindings
################################################################################
bind C-a send-prefix # Ensure that we can send Ctrl-A to other apps
unbind-key C-z # Unbind default suspend keybinding

bind r source-file ~/.tmux.conf # Reload tmux config

# Splitting panes
bind | split-window -h
bind \\ split-window -h
bind - split-window -v
bind _ split-window -v

# Moving between panes
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Kill current session
bind X confirm-before kill-session

# Smart pane switching with awareness of vim/nvim splits & terminal multiplexer (tmux).
# If the pane's current command is vim/nvim/vimdiff, forward C-h/j/k/l to it
# (which moves between editor splits); otherwise switch tmux panes.
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\\/)n?vim(diff)?$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\\/)n?vim(diff)?$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\\/)n?vim(diff)?$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\\/)n?vim(diff)?$' && tmux send-keys C-l) || tmux select-pane -R"



################################################################################
# Status Bar
################################################################################
set -g status-left " "
set -g status-right-length 60
set -g status-right " #S #{@divider} %b %d, %H:%M "
# Theme colours are managed by tmux-dark-notify (see Plugins section below).
# Source the dark theme here as a fallback so the bar is styled immediately on
# first launch, before dark-notify's watcher has had a chance to write the
# symlink at ~/.local/state/tmux/tmux-dark-notify-theme.conf. Once dark-notify
# runs, the if-shell at the bottom of this file overrides this with the
# system-appropriate theme.
source-file ~/.tmux/themes/atom-one/dark.tmux.conf
################################################################################



################################################################################
# Plugins
################################################################################

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'erikw/tmux-dark-notify'
set -g @plugin 'b0o/tmux-autoreload'

set -g @dark-notify-theme-path-light '~/.tmux/themes/atom-one/light.tmux.conf'
set -g @dark-notify-theme-path-dark '~/.tmux/themes/atom-one/dark.tmux.conf'

run '~/.tmux/plugins/tpm/tpm'

if-shell "test -e ~/.local/state/tmux/tmux-dark-notify-theme.conf" \
     "source-file ~/.local/state/tmux/tmux-dark-notify-theme.conf"
