# Atom One Dark — applied by tmux-dark-notify when system is in dark mode

set-option -g status-style fg=#abb2bf,bg=#282c34                          # status bar: light grey on charcoal
set-window-option -g window-status-style fg=#5c6370,bg=default            # inactive window: muted grey
set-window-option -g window-status-current-style fg=#61afef,bg=default    # active window: blue accent
set-option -g pane-border-style fg=#3e4451                                # pane border: dim
set-option -g pane-active-border-style fg=#61afef                         # active pane border: blue accent
set-option -g message-style fg=#e5c07b,bg=#282c34                         # command/prompt messages: yellow on charcoal
set-window-option -g window-status-bell-style fg=#282c34,bg=#e06c75       # bell alert: charcoal on red
set-option -g @divider "#[fg=#5c6370]•#[default]"                         # status-right bullet: inactive-window grey
