# Atom One Light — applied by tmux-dark-notify when system is in light mode
# Colour roles mirror dark.tmux.conf so contrast & meaning stay consistent.

set-option -g status-style fg=#383a42,bg=#fafafa                          # status bar: dark grey on near-white
set-window-option -g window-status-style fg=#a0a1a7,bg=default            # inactive window: muted grey (lighter than dark theme's)
set-window-option -g window-status-current-style fg=#4078f2,bg=default    # active window: blue accent (Atom One Light blue)
set-option -g pane-border-style fg=#d3d3d3                                # pane border: soft grey, low contrast on white
set-option -g pane-active-border-style fg=#4078f2                         # active pane border: blue accent
set-option -g message-style fg=#c18401,bg=#fafafa                         # command/prompt messages: amber on near-white
set-window-option -g window-status-bell-style fg=#fafafa,bg=#e45649       # bell alert: near-white on red
set-option -g @divider "#[fg=#a0a1a7]•#[default]"                         # status-right bullet: inactive-window grey
